<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scientific Table Tennis Sandbox</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="ui">
        <h2>Table Tennis Sandbox</h2>

        <div class="config-panel" id="configLeft">
            <h3>🔴 Left Player</h3>
            <div class="config-row"><label>Control:</label> <select id="modeLeft"><option value="human">Human</option><option value="ai" selected>AI</option></select></div>
            <div class="config-row"><label>Style:</label> <select id="styleLeft"><option value="allround" selected>Allround</option><option value="aggressive">Aggressive</option><option value="chop">Chop</option><option value="block">Block</option></select></div>
        </div>

        <div class="config-panel right-ai" id="configRight">
            <h3>🔵 Right Player</h3>
            <div class="config-row"><label>Control:</label> <select id="modeRight" disabled><option value="ai" selected>AI</option></select></div>
            <div class="config-row"><label>Style:</label> <select id="styleRight"><option value="allround" selected>Allround</option><option value="aggressive">Aggressive</option><option value="chop">Chop</option><option value="block">Block</option></select></div>
        </div>

        <div id="infoPanel">
            <div><strong>Score:</strong> <span id="scoreLeft">0</span> (L) - <span id="scoreRight">0</span> (R)</div>
            <div><strong>Status:</strong> <span id="statusMsg">Waiting...</span></div>
            <div id="stats">Speed: 0.0 m/s<br>Spin: 0 RPM</div> 
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>
    <script type="module" src="main.js"></script>
</body>
</html>
